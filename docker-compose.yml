# A persistent local PostgreSQL for the Mosaic Platform.
#
# Start it with:   docker compose up -d
#
# **This is not how the tests are run.** They run in their own container, which
# brings its own throwaway database and needs nothing from this file:
#
#   docker compose -f docker-compose.test.yml run --rm test
#
# What this file is for is a database that *survives* — one whose contents are
# still there tomorrow, for looking at real data or keeping a dev instance's
# state across restarts. The test stack deliberately does the opposite.

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: mosaic
      POSTGRES_PASSWORD: mosaic
      POSTGRES_DB: mosaic
    ports:
      - "5432:5432"
    volumes:
      - mosaic-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mosaic -d mosaic"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mosaic-postgres-data:
