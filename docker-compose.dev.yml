# The Mosaic dev stack — published dependencies.
#
#   docker compose -f docker-compose.dev.yml up
#
# Three services, one process each, wired by healthchecks. This replaces an
# earlier single container that ran all three under supervisord: collapsing them
# saved an image layer and cost the things compose does properly — ordering by
# readiness rather than by a hand-rolled wait loop, restarting one service
# without the others, and a per-service log stream. The layers were the cheaper
# thing to spend.
#
# **This file builds against published versions**: the Platform resolves its
# modules from the Go proxy and the Shell installs from npm. It is what a
# contributor with no sibling checkouts gets, and what CI would run.
#
# For a stack that uses the sibling working copies instead, add the local
# overlay — see docker-compose.local.yml:
#
#   docker compose -f docker-compose.dev.yml -f docker-compose.local.yml up
#
# The existing docker-compose.yml stays as it is: postgres alone, for running
# the integration tests against a persistent database.
name: mosaic-dev

services:
  postgres:
    # 18 is current; the official image handles cluster init and database
    # creation, which is why this needs no entrypoint of its own.
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: mosaic
      POSTGRES_PASSWORD: mosaic
      POSTGRES_DB: mosaic
    ports:
      # 5433 on the host on purpose. A natively-installed PostgreSQL already
      # holds 5432 on at least one dev machine, and that clash surfaces as
      # something connecting to the *wrong* database rather than failing to
      # start — a far worse afternoon.
      - "5433:5432"
    volumes:
      # Mounted at /var/lib/postgresql, NOT .../data. The 18+ images store data
      # in a major-version-specific subdirectory so that `pg_upgrade --link` has
      # no mount-point boundary to cross; a volume at the old path is refused at
      # startup rather than silently ignored, which is the right call and worth
      # knowing before it looks like a broken image.
      - mosaic-dev-pgdata18:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mosaic -d mosaic"]
      interval: 5s
      timeout: 5s
      retries: 20

  platform:
    build:
      context: .
      dockerfile: Dockerfile.dev
    depends_on:
      # The Platform exits if it cannot reach the database. Waiting on the
      # healthcheck is what compose is for; the previous design hand-rolled a
      # pg_isready loop because supervisord has no equivalent.
      postgres:
        condition: service_healthy
    environment:
      MOSAIC_POSTGRES_DSN: "postgres://mosaic:mosaic@postgres:5432/mosaic?sslmode=disable"
      MOSAIC_BOOTSTRAP_ADMIN_USERNAME: "admin"
      MOSAIC_BOOTSTRAP_ADMIN_PASSWORD: "admin"
      MOSAIC_API_ADDR: ":8081"
      MOSAIC_HEALTH_ADDR: ":8080"
      # The TMDB read token (ADR 0072), from ./.env or your shell — never a
      # GitHub secret, which reaches only CI, not a local build. Empty is fine.
      TMDB_RAC: "${TMDB_RAC:-}"
    # Link the TMDB token into this dev build with -X, the same way the release
    # binary is built, so a keyed TMDB works out of the box. Empty TMDB_RAC sets
    # an empty string — TMDB then needs a key in Settings, with Cinemeta as the
    # zero-config floor. Overrides Dockerfile.dev's plain `go run` CMD; the local
    # overlay overrides this in turn and injects the same flag itself.
    command:
      - sh
      - -c
      - >-
        if [ -n "$${TMDB_RAC}" ]; then echo "TMDB: linking a read token into this dev build"; else echo "TMDB: no bundled token (set TMDB_RAC in platform/.env, or add a key in Settings)"; fi;
        exec go run -ldflags "-X github.com/mosaic-media/module-tmdb.defaultReadAccessToken=$${TMDB_RAC}" ./cmd/mosaic-platform
    volumes:
      - .:/src/platform
      # Caches live in volumes, not on the bind mount. Source comes from the
      # host filesystem, and letting Go write thousands of cache files across
      # that boundary turns a warm rebuild from seconds into minutes.
      - mosaic-dev-gomod:/go/pkg/mod
      - mosaic-dev-gobuild:/root/.cache/go-build
    ports:
      - "8081:8081"
      - "8080:8080"
    healthcheck:
      # The Platform answering is what "up" means. `go run` compiles first, so
      # the process existing says nothing about the port being open — hence the
      # long start_period rather than a long interval.
      #
      # This asks the Supervisor handoff on :8080 rather than the client API,
      # which is what that surface is for: readiness is an operational question
      # and the handoff answers it in one GET. It used to POST a GraphQL
      # introspection query at :8081; ADR 0061 removed that endpoint, and a
      # Connect service has no equivalent "are you there" call that does not
      # also need credentials.
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/readyz >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 240s

  web:
    image: node:22-bookworm-slim
    depends_on:
      platform:
        condition: service_started
    working_dir: /src/web
    environment:
      # Vite dev-proxies the auth and session services, /artwork and /playback
      # to the Platform (see the Shell's vite.config.ts).
      MOSAIC_PLATFORM_URL: "http://platform:8081"
    volumes:
      - ../web:/src/web
      # This comment used to say the web lockfile links @mosaic-media/sdui to
      # the sibling checkout rather than the registry. It does not:
      # web/package-lock.json resolves that package from registry.npmjs.org,
      # pinned by integrity hash. Believing otherwise is what let the Shell run
      # against a stale contract version while a field was dropped on the wire
      # with no error at any layer.
      #
      # The mount is kept so the path resolves, but npm does not read it — a
      # local contracts edit does not reach the Shell without an npm link that
      # does not exist yet.
      # (module-remote-playback used to need a mount here too; it is published
      # now, so the Go side of this file needs no checkouts at all.)
      - ../contracts:/src/contracts
      - mosaic-dev-npm:/root/.npm
      # node_modules are volumes rather than part of the bind mount: an npm
      # install writes tens of thousands of small files, which is the worst
      # possible shape for a cross-OS mount, and it keeps the container's Linux
      # binaries from colliding with a host-side install.
      - mosaic-dev-node-root:/src/web/node_modules
      - mosaic-dev-node-shell:/src/web/packages/shell/node_modules
      - mosaic-dev-node-sdui:/src/web/packages/sdui-react/node_modules
    # --host is required: without it Vite binds to loopback inside the container
    # and nothing on the host can reach it, which looks exactly like the dev
    # server failing to start.
    command: >
      sh -c "npm install --no-fund --no-audit &&
             npm run build --workspace @mosaic-media/sdui-react &&
             exec npm run dev --workspace mosaic-shell -- --host 0.0.0.0 --port 5173 --strictPort"
    ports:
      - "5173:5173"

volumes:
  # Named for its major version: the 17-and-earlier layout is not readable by
  # 18, so reusing the old name would fail on a stale volume rather than start
  # clean.
  mosaic-dev-pgdata18:
  mosaic-dev-gomod:
  mosaic-dev-gobuild:
  mosaic-dev-npm:
  mosaic-dev-node-root:
  mosaic-dev-node-shell:
  mosaic-dev-node-sdui:
