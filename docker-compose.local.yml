# Local-checkout overlay for the Mosaic dev stack.
#
#   docker compose -f docker-compose.dev.yml -f docker-compose.local.yml up
#
# The base file builds against published versions. This one swaps in the sibling
# working copies, so an edit in `sdk`, `contracts` or a module is picked up by a
# restart rather than by a tag-and-publish round trip.
#
# It expects the repositories checked out as siblings, which the platform
# CLAUDE.md already assumes:
#
#   Mosaic/
#     platform/            <- this repository
#     sdk/  contracts/
#     module-remote-playback/  module-tmdb/  module-cinemeta/   <- the core modules
#     web/
#
# Only the *core* modules are overlaid: they are compiled into the Platform
# binary, so a local edit to one reaches the build through the workspace.
# Extension modules (Stremio, AIOStreams, fanart.tv) are **not** here — they are
# not platform dependencies (ADR 0081); they are installed at runtime, so a local
# change to one is exercised through the install path, not this workspace.
#
# **Go side: a workspace, not a `replace`.** `go.work` overrides the module
# cache for whatever it lists, and it lives only inside the container — so
# switching between published and local changes no committed file. Editing
# go.mod would do the same job and leave the repository in a state that only
# builds on one machine, which is how a `replace` for a published module ends up
# committed by accident.
#
# **npm side: there is no local override, and this file used to claim there
# was.** The comment here read "the lockfile already links `@mosaic-media/sdui`
# to `../sdui`". It does not: `web/package-lock.json` resolves that package from
# `https://registry.npmjs.org`, pinned by integrity hash. The same wrong belief
# in `web`'s CLAUDE.md is what let the Shell sit on a stale contract version
# while a field was silently dropped on the wire — no error at any layer.
#
# So a local edit in `contracts` reaches the Go side through the workspace below
# and does **not** reach the Shell. Making it do so needs an npm link or a
# workspace entry that does not exist yet; the mount on the `web` service is
# kept so the path resolves, not because npm reads it.
services:
  platform:
    volumes:
      - ../sdk:/src/sdk
      - ../contracts:/src/contracts
      - ../module-remote-playback:/src/module-remote-playback
      - ../module-tmdb:/src/module-tmdb
      - ../module-cinemeta:/src/module-cinemeta
    environment:
      # GOWORK points the workspace *outside* the bind mount. Writing go.work
      # into /src/platform would put it on the host, where its container paths
      # are meaningless — it broke host builds the first time, with errors about
      # /src/contracts not existing. A workspace is a local-development artifact and
      # must not escape into a repository.
      GOWORK: /work/go.work
    # Written at start rather than baked into the image: the image is shared with
    # the published stack and must not carry a workspace at all.
    command: >
      sh -c "mkdir -p /work &&
             rm -f /work/go.work &&
             go work init &&
             go work use /src/platform /src/sdk /src/contracts /src/module-remote-playback /src/module-tmdb /src/module-cinemeta &&
             cd /src/platform &&
             exec go run -ldflags \"-X github.com/mosaic-media/module-tmdb.defaultReadAccessToken=$${TMDB_RAC}\" ./cmd/mosaic-platform"

  web:
    volumes:
      # Kept so the path resolves, not because npm reads it — see the npm note
      # at the top of this file. sdui-react is a workspace package and needs no
      # mount either way.
      - ../contracts:/src/contracts
